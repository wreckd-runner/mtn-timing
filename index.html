<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MTN Load Test</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',system-ui,sans-serif;background:#f0f0ea;color:#1a1a1a;padding:16px;}
h1{font-size:1rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.sub{font-size:.72rem;color:#666;margin-bottom:20px;}
.card{background:#fff;border:1px solid #c8c8c2;border-radius:8px;padding:14px;margin-bottom:12px;}
.card h2{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#666;margin-bottom:10px;}
label{font-size:.72rem;color:#666;display:block;margin-bottom:3px;}
input,select{width:100%;border:1px solid #c8c8c2;border-radius:4px;padding:8px 10px;font-size:.85rem;margin-bottom:10px;font-family:monospace;}
button{background:#006b5e;color:#fff;border:none;border-radius:5px;padding:10px 16px;font-size:.8rem;font-weight:600;cursor:pointer;margin-right:6px;margin-bottom:6px;}
button.red{background:#b02020;}
button.grey{background:#888;}
button:disabled{background:#ccc;cursor:not-allowed;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-top:8px;}
.device{background:#f8f8f2;border:1px solid #c8c8c2;border-radius:6px;padding:10px;font-size:.7rem;}
.device .name{font-weight:700;font-size:.78rem;margin-bottom:4px;}
.device .stat{display:flex;justify-content:space-between;margin-bottom:2px;}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;}
.green{background:#1a7a3a;} .red{background:#b02020;} .amber{background:#9a7000;} .grey2{background:#999;}
.log{font-family:'DM Mono',monospace;font-size:.63rem;background:#1a1a1a;color:#7fffa0;padding:10px;border-radius:6px;height:200px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;margin-top:8px;}
.results-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;}
.result-box{background:#f8f8f2;border:1px solid #c8c8c2;border-radius:6px;padding:10px;text-align:center;}
.result-box .val{font-size:1.4rem;font-weight:700;color:#006b5e;}
.result-box .lbl{font-size:.62rem;color:#888;text-transform:uppercase;letter-spacing:.5px;}
.result-box.warn .val{color:#9a7000;}
.result-box.bad .val{color:#b02020;}
.progress{background:#e0e0da;border-radius:4px;height:6px;margin-top:4px;}
.progress-bar{background:#006b5e;height:6px;border-radius:4px;transition:width .3s;}
</style>
</head>
<body>

<h1>MTN Load Test</h1>
<p class="sub">Simulates up to 10 concurrent marshal devices — tests Supabase real-time under race conditions</p>

<div class="card">
  <h2>Configuration</h2>
  <label>Race Code</label>
  <input id="cfg-code" placeholder="e.g. MTN-847" style="text-transform:uppercase;letter-spacing:2px;" oninput="this.value=this.value.toUpperCase()">
  <label>Number of simulated marshal devices</label>
  <select id="cfg-devices">
    <option value="2">2 devices</option>
    <option value="5">5 devices</option>
    <option value="10" selected>10 devices</option>
    <option value="15">15 devices</option>
  </select>
  <label>Entries per device (simulated finishers)</label>
  <select id="cfg-entries">
    <option value="5">5 entries</option>
    <option value="10" selected>10 entries</option>
    <option value="20">20 entries</option>
    <option value="50">50 finishers</option>
  </select>
  <label>Delay between entries (ms)</label>
  <select id="cfg-delay">
    <option value="0">No delay (burst)</option>
    <option value="200" selected>200ms (fast race)</option>
    <option value="500">500ms (normal)</option>
    <option value="2000">2s (realistic)</option>
  </select>
  <button onclick="runTest()">▶ Run Load Test</button>
  <button class="red" onclick="cleanupTest()" id="cleanup-btn" disabled>🗑 Clean Up Test Data</button>
</div>

<div class="card" id="devices-card" style="display:none;">
  <h2>Simulated Devices</h2>
  <div class="grid" id="device-grid"></div>
</div>

<div class="card" id="results-card" style="display:none;">
  <h2>Results</h2>
  <div class="results-grid" id="results-grid"></div>
  <div class="log" id="test-log">Test log will appear here…</div>
</div>

<script>
const SUPA_URL = 'https://sxteygsekiurfuclvuwu.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN4dGV5Z3Nla2l1cmZ1Y2x2dXd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0ODkyNjUsImV4cCI6MjA5OTA2NTI2NX0.EcCSPfqB-4QsY9eH9GkMGwEQK2KHZ6_OTLCWUvexBNc';

let devices = [], testRaceCode = '', testUids = [], running = false;

function log(msg){
  const el = document.getElementById('test-log');
  const t = new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  el.textContent = `[${t}] ${msg}\n` + el.textContent;
}

function uid(){ return 'lt-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,6); }

function updateDevice(idx, updates){
  const d = devices[idx];
  if(!d) return;
  Object.assign(d, updates);
  const el = document.getElementById(`dev-${idx}`);
  if(!el) return;
  const statusCol = d.connected ? 'green' : d.error ? 'red' : 'amber';
  el.innerHTML = `
    <div class="name"><span class="dot ${statusCol}"></span>${d.name}</div>
    <div class="stat"><span>Status</span><span>${d.status}</span></div>
    <div class="stat"><span>Sent</span><span style="color:#006b5e;font-weight:600;">${d.sent}</span></div>
    <div class="stat"><span>Received</span><span style="color:#1a4a8a;font-weight:600;">${d.received}</span></div>
    <div class="stat"><span>Latency</span><span>${d.avgLatency>0?Math.round(d.avgLatency)+'ms':'—'}</span></div>
    <div class="progress"><div class="progress-bar" style="width:${d.progress}%"></div></div>
  `;
}

function updateResults(){
  const sent = devices.reduce((s,d)=>s+d.sent,0);
  const received = devices.reduce((s,d)=>s+d.received,0);
  const connected = devices.filter(d=>d.connected).length;
  const avgLat = devices.filter(d=>d.avgLatency>0).reduce((s,d)=>s+d.avgLatency,0)/Math.max(1,devices.filter(d=>d.avgLatency>0).length);
  const deliveryRate = sent > 0 ? Math.round(received/sent*100) : 0;

  const el = document.getElementById('results-grid');
  el.innerHTML = `
    <div class="result-box ${connected<devices.length?'warn':''}">
      <div class="val">${connected}/${devices.length}</div>
      <div class="lbl">Connected</div>
    </div>
    <div class="result-box ${deliveryRate<90?'bad':deliveryRate<100?'warn':''}">
      <div class="val">${deliveryRate}%</div>
      <div class="lbl">RT Delivery</div>
    </div>
    <div class="result-box ${avgLat>2000?'bad':avgLat>500?'warn':''}">
      <div class="val">${avgLat>0?Math.round(avgLat)+'ms':'—'}</div>
      <div class="lbl">Avg Latency</div>
    </div>
    <div class="result-box">
      <div class="val">${sent}</div>
      <div class="lbl">Total Entries</div>
    </div>
  `;
}

async function runTest(){
  const code = document.getElementById('cfg-code').value.trim().toUpperCase();
  if(!code){ alert('Enter a race code first'); return; }
  const nDevices = parseInt(document.getElementById('cfg-devices').value);
  const nEntries = parseInt(document.getElementById('cfg-entries').value);
  const delay = parseInt(document.getElementById('cfg-delay').value);

  testRaceCode = code;
  testUids = [];
  running = true;
  devices = [];

  document.getElementById('devices-card').style.display='block';
  document.getElementById('results-card').style.display='block';
  document.getElementById('test-log').textContent='';
  document.getElementById('cleanup-btn').disabled=false;

  log(`Starting load test — ${nDevices} devices, ${nEntries} entries each, race code: ${code}`);

  // Ensure race exists
  const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
  await sb.from('races').upsert({race_code:code, name:'Load Test', created_by:'loadtest'},{onConflict:'race_code',ignoreDuplicates:true});

  // Build device grid
  const grid = document.getElementById('device-grid');
  grid.innerHTML = '';
  for(let i=0; i<nDevices; i++){
    const pointNames = ['Finish','Start','KM10','KM21','Marshal A','Marshal B','Marshal C','Roving 1','TEC 1','TEC 2'];
    devices.push({
      name: pointNames[i] || `Point ${i+1}`,
      deviceId: `lt-device-${i}-${Date.now().toString(36)}`,
      connected: false, sent: 0, received: 0, error: false,
      status: 'Connecting…', avgLatency: 0, latencies: [], progress: 0,
      supa: null, channel: null
    });
    const div = document.createElement('div');
    div.className = 'device'; div.id = `dev-${i}`;
    grid.appendChild(div);
    updateDevice(i, {});
  }

  // Phase 1: Connect all devices
  log('Phase 1: Connecting all devices to Supabase real-time…');
  const connectPromises = devices.map((d, i) => new Promise(resolve => {
    d.supa = window.supabase.createClient(SUPA_URL, SUPA_KEY);
    const pendingLatencies = {};
    d.channel = d.supa.channel('race-' + code)
      .on('postgres_changes', {event:'INSERT', schema:'public', table:'entries', filter:`race_code=eq.${code}`},
        payload => {
          if(payload.new?.device_id !== d.deviceId){ // received from another device
            d.received++;
            const sent_ts = payload.new?._test_ts;
            if(sent_ts){
              const lat = Date.now() - sent_ts;
              d.latencies.push(lat);
              d.avgLatency = d.latencies.reduce((a,b)=>a+b,0)/d.latencies.length;
            }
            updateDevice(i, {}); updateResults();
          }
        })
      .subscribe(status => {
        if(status === 'SUBSCRIBED'){
          d.connected = true; d.status = 'Live';
          updateDevice(i, {}); updateResults();
          log(`✅ ${d.name} connected`);
          resolve();
        } else if(status === 'CHANNEL_ERROR' || status === 'TIMED_OUT'){
          d.error = true; d.status = 'Failed';
          updateDevice(i, {}); updateResults();
          log(`❌ ${d.name} failed: ${status}`);
          resolve();
        }
      });
    setTimeout(resolve, 8000); // timeout after 8s
  }));
  await Promise.all(connectPromises);
  log(`Phase 1 complete: ${devices.filter(d=>d.connected).length}/${nDevices} connected`);

  // Phase 2: Each device sends entries
  log(`Phase 2: Each device sending ${nEntries} entries…`);
  const startTime = Date.now();

  const sendPromises = devices.map(async (d, i) => {
    if(!d.connected) return;
    for(let j=0; j<nEntries; j++){
      const entryUid = uid();
      testUids.push(entryUid);
      const bib = String(i * 100 + j + 1);
      const entry = {
        uid: entryUid,
        race_code: code,
        device_id: d.deviceId,
        point_name: d.name,
        type: 'finish',
        bib,
        time: new Date().toLocaleTimeString(),
        pos: j+1,
        is_team: false, has_flag: false, flag_reason: '',
        tags: [], timestamp: Date.now(),
        _test_ts: Date.now() // for latency calc
      };
      const {error} = await d.supa.from('entries').insert(entry);
      if(!error){
        d.sent++;
        d.progress = Math.round((j+1)/nEntries*100);
        updateDevice(i, {status:`Sent ${j+1}/${nEntries}`});
        updateResults();
        if(j===0) log(`📤 ${d.name} sending entries…`);
      } else {
        log(`⚠ ${d.name} insert error: ${error.message}`);
      }
      if(delay > 0) await new Promise(r=>setTimeout(r, delay + Math.random()*delay*0.5));
    }
    d.status = 'Done'; d.progress = 100;
    updateDevice(i, {});
    log(`✅ ${d.name} finished sending`);
  });

  await Promise.all(sendPromises);

  // Wait a moment for all real-time events to arrive
  log('Waiting 3s for all real-time events to propagate…');
  await new Promise(r=>setTimeout(r, 3000));

  const totalTime = ((Date.now()-startTime)/1000).toFixed(1);
  const totalSent = devices.reduce((s,d)=>s+d.sent, 0);
  const totalReceived = devices.reduce((s,d)=>s+d.received, 0);
  // Each device should receive entries from all OTHER devices
  const expectedPerDevice = totalSent - devices.find(d=>d.sent>0)?.sent || 0;
  const deliveryRate = totalSent > 0 ? (totalReceived / (totalSent * (devices.length-1)) * 100).toFixed(1) : 0;
  const avgLat = devices.filter(d=>d.avgLatency>0).reduce((s,d)=>s+d.avgLatency,0)/Math.max(1,devices.filter(d=>d.avgLatency>0).length);

  log('');
  log('═══════════════ RESULTS ═══════════════');
  log(`Total entries sent:     ${totalSent}`);
  log(`Total entries received: ${totalReceived}`);
  log(`Real-time delivery:     ${deliveryRate}%`);
  log(`Average latency:        ${Math.round(avgLat)}ms`);
  log(`Total test time:        ${totalTime}s`);
  log(`Connected devices:      ${devices.filter(d=>d.connected).length}/${nDevices}`);
  log('');
  if(parseFloat(deliveryRate) >= 98) log('✅ PASS — Real-time delivery is reliable');
  else if(parseFloat(deliveryRate) >= 90) log('⚠ WARN — Some events dropped. Check Supabase plan limits.');
  else log('❌ FAIL — Significant event loss. May need Supabase Pro plan or throttling.');
  if(avgLat < 500) log('✅ Latency good — updates appear near-instant');
  else if(avgLat < 2000) log('⚠ Latency acceptable — slight delay between devices');
  else log('❌ Latency high — may affect real-time feel during race');
  log('═══════════════════════════════════════');

  updateResults();
  running = false;
}

async function cleanupTest(){
  if(!testRaceCode){ alert('No test data to clean'); return; }
  if(!confirm(`Delete all load test entries for race code ${testRaceCode}?`)) return;
  log('Cleaning up test data…');
  const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
  // Delete entries inserted by load test devices
  const {error} = await sb.from('entries').delete().eq('race_code', testRaceCode).like('device_id','lt-device-%');
  if(!error) log(`✅ Test entries deleted for ${testRaceCode}`);
  else log(`❌ Cleanup error: ${error.message}`);
  // Disconnect all channels
  devices.forEach(d=>{ if(d.supa&&d.channel) d.supa.removeChannel(d.channel); });
  document.getElementById('cleanup-btn').disabled = true;
}
</script>
</body>
</html>
